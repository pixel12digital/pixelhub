; Limites PHP para upload de mídia (áudio/imagem/vídeo)
; Necessário para áudios longos que podem ter vários MB em base64
; Este arquivo funciona em servidores com PHP-FPM

upload_max_filesize = 512M
post_max_size = 512M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M

; Desabilita output buffering para garantir resposta imediata ao webhook Whapi
output_buffering = Off
